<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div class="container">
        <div id="labels">
            <button id="option"><i class="fa-solid fa-bars"></i></button>
            <button id="history"><i class="fa-light fa-clock-rotate-left"></i></button>
        </div>
        <div id="display">
            <div id="expressions"></div>
            <div id="result">0</div>
        </div>
        <div id="keys">
            <button><i class="fa-light fa-delete-left"></i></button>
            <button>AC</button>
            <button>%</button>
            <button>/</button>
            <button>*</button>
            <button>-</button>
            <button>+</button>
            <button>=</button>
            <button>9</button>
            <button>8</button>
            <button>7</button>
            <button>6</button>
            <button>5</button>
            <button>4</button>
            <button>3</button>
            <button>2</button>
            <button>1</button>
            <button>.</button>
            <button>0</button>
            <button>+/-</button>
            <button>(</button>
            <button>)</button>
            <button>mr</button>
            <button>m-</button>
            <button>m+</button>
            <button>mc</button>
            <button>ln</button>
            <button>log</button>
            <button>e</button>
            <button>&pi;</button>
            <button>10 <sub>X</sub></button>
            <button>X <sub>2</sub></button>
            <button>X <sub>3</sub></button>
            <button>X <sub>y</sub></button>
            <button>&radic;</button>
            <button>&#8731;</button>
            <button>y <sub>&radic;X</sub></button>
            <button>sin</button>
            <button>cos</button>
            <button>tan</button>
            <button>sinh</button>
            <button>cosh</button>
            <button>tanh</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
