<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <div class="app-wrapper">
    <div class="container">
        <div id="labels">
            <button id="scientificToggle"><i class="fa-solid fa-bars"></i></button>
            <button id="history"><i class="fa-solid fa-clock-rotate-left"></i></button>
        </div>
        <div id="display">
            <div id="expressions"></div>
            <div id="result">0</div>
        </div>
        <div id="keys">
            <div id="scifi-keys">
                <button class="key function" data-action="open-paren" data-value="(">(</button>
                <button class="key function" data-action="close-paren" data-value=")">)</button>
                <button class="key memory" data-action="memory-recall" data-value="mr">mr</button>
                <button class="key memory" data-action="memory-subtract" data-value="m-">m-</button>
                <button class="key memory" data-action="memory-add" data-value="m+">m+</button>
                <button class="key memory" data-action="memory-clear" data-value="mc">mc</button>
                <button class="key function" data-action="second" data-value="2nd">2<sup>nd</sup></button>
                <button class="key function" data-action="ln" data-value="ln">ln</button>
                <button class="key function" data-action="log" data-value="log">log</button>
                <button class="key function" data-action="e" data-value="e">e</button>
                <button class="key function" data-action="pi" data-value="pi">&pi;</button>
                <button class="key function" data-action="power-of-10" data-value="10^x">10<sup>x</sup></button>
                <button class="key function" data-action="square" data-value="x^2">x<sup>2</sup></button>
                <button class="key function" data-action="cube" data-value="x^3">x<sup>3</sup></button>
                <button class="key function" data-action="power" data-value="x^y">x<sup>y</sup></button>
                <button class="key function" data-action="sqrt" data-value="sqrt(x)">&radic;x</button>
                <button class="key function" data-action="cbrt" data-value="cbrt(x)">&#8731;x</button>
                <button class="key function" data-action="yroot" data-value="y-root">y<sub>&radic;X</sub></button>
                <button class="key function" data-action="sin" data-value="sin">sin</button>
                <button class="key function" data-action="cos" data-value="cos">cos</button>
                <button class="key function" data-action="tan" data-value="tan">tan</button>
                <button class="key function" data-action="sinh" data-value="sinh">sinh</button>
                <button class="key function" data-action="cosh" data-value="cosh">cosh</button>
                <button class="key function" data-action="tanh" data-value="tanh">tanh</button>
                <button class="key function" data-action="factorial" data-value="x!">x!</button>
                <button class="key function" data-action="random" data-value="rand">Rand</button>
                <button class="key mode" data-action="angle-mode" data-value="rad">Rad</button>
            </div>
            <div id="stan-keys">
                <button class="key clear" data-action="delete" data-value="del"><i class="fa-solid fa-delete-left"></i></button>
                <button class="key clear" data-action="clear" data-value="ac">AC</button>
                <button class="key operator" data-action="percent" data-value="%">%</button>
                <button class="key operator" data-action="operator" data-value="/">÷</button>
                <button class="key number" data-action="number" data-value="7">7</button>
                <button class="key number" data-action="number" data-value="8">8</button>
                <button class="key number" data-action="number" data-value="9">9</button>
                <button class="key operator" data-action="operator" data-value="*">×</button>
                <button class="key number" data-action="number" data-value="4">4</button>
                <button class="key number" data-action="number" data-value="5">5</button>
                <button class="key number" data-action="number" data-value="6">6</button>
                <button class="key operator" data-action="operator" data-value="-">-</button>
                <button class="key number" data-action="number" data-value="1">1</button>
                <button class="key number" data-action="number" data-value="2">2</button>
                <button class="key number" data-action="number" data-value="3">3</button>
                <button class="key operator" data-action="operator" data-value="+">+</button>
                <button class="key number" data-action="negate" data-value="+/-">+/-</button>
                <button class="key number" data-action="number" data-value="0">0</button>
                <button class="key number" data-action="decimal" data-value=".">.</button>
                <button class="key operator" data-action="equals" data-value="=">=</button>
            </div>          
        </div>
    </div>
    <div id="historyPanel">
        <h3>History</h3>
        <ul id="historyList"></ul>
    </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
